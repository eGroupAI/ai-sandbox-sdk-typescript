name: public security guards

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dependency review
        if: github.event_name == 'pull_request'
        id: dependency_review
        uses: actions/dependency-review-action@v4
        continue-on-error: true

      - name: Dependency review note
        if: github.event_name == 'pull_request' && steps.dependency_review.outcome != 'success'
        run: echo "Dependency review skipped or unsupported on this repository." >> "$GITHUB_STEP_SUMMARY"

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: License declaration check
        run: |
          if ! grep -qi "Apache-2.0" README.md; then
            echo "README.md must declare Apache-2.0 license."
            exit 1
          fi
